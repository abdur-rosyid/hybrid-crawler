sensor_fuser:
  ros__parameters:
    # Control is unified left/right. Raw sensors remain left/right arrays.
    # Cable: combines 5 left + 5 right contact sensors into /cable/Fc_act
    cable_reduce: "max"              # "max", "mean", "sum", or "min"

    # Soft front/rear: each [left,right] pair is reduced to one control feedback value.
    soft_front_force_reduce: "max"   # contact: safer default if one side contacts first
    soft_rear_force_reduce: "max"
    soft_front_pressure_reduce: "mean"
    soft_rear_pressure_reduce: "mean"

    # Exponential smoothing. 1.0 = no smoothing; lower = smoother/slower.
    alpha_force: 0.2
    alpha_pressure: 0.2
